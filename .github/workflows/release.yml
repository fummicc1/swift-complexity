name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release
    runs-on: macos-15
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            if [[ $VERSION == *"alpha"* ]] || [[ $VERSION == *"beta"* ]] || [[ $VERSION == *"rc"* ]]; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Is pre-release: $IS_PRERELEASE"

      - name: Setup Xcode
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1"

      - name: Setup Swift
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            # Install dependencies for Swiftly
            sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev pkg-config python3-lldb-13

            # Install Swiftly
            curl -O https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz
            tar zxf swiftly-$(uname -m).tar.gz
            ./swiftly init --verbose --assume-yes --skip-install
            . ~/.local/share/swiftly/env.sh

            # Install Swift
            swiftly install 6.2
            echo "$(dirname $(which swift))" >> $GITHUB_PATH
          else
            # macOS - use Xcode's Swift
            echo "Using Xcode's Swift on macOS"
            xcode-select --print-path
          fi
          swift --version

      - name: Build and test
        run: |
          swift build --configuration release
          swift test

  build-artifacts:
    name: Build Release Artifacts
    needs: validate
    strategy:
      matrix:
        include:
          - os: macos-15
            arch: arm64
            platform: macos
          - os: macos-15
            arch: x86_64
            platform: macos
          - os: ubuntu-22.04
            arch: x86_64
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1"

      - name: Setup Swift
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            # Install dependencies for Swiftly
            sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev pkg-config python3-lldb-13

            # Install Swiftly
            curl -O https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz
            tar zxf swiftly-$(uname -m).tar.gz
            ./swiftly init --verbose --assume-yes --skip-install
            . ~/.local/share/swiftly/env.sh

            # Install Swift
            swiftly install 6.2
            echo "$(dirname $(which swift))" >> $GITHUB_PATH
          else
            # macOS - use Xcode's Swift
            echo "Using Xcode's Swift on macOS"
            xcode-select --print-path
          fi
          swift --version

      - name: Build for ${{ matrix.platform }}-${{ matrix.arch }}
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            swift build \
              --configuration release \
              --arch ${{ matrix.arch }} \
              --product SwiftComplexityCLI
            swift build \
              --configuration release \
              --arch ${{ matrix.arch }} \
              --product SwiftComplexityMCP
          else
            # Linux: Get toolchain path for libdispatch headers
            SWIFTLY_HOME="${HOME}/.local/share/swiftly"
            TOOLCHAIN_USR=$(ls -d ${SWIFTLY_HOME}/toolchains/*/usr 2>/dev/null | head -1)
            swift build \
              --configuration release \
              --product SwiftComplexityCLI \
              -Xcxx -I${TOOLCHAIN_USR}/lib/swift \
              -Xcxx -I${TOOLCHAIN_USR}/lib/swift/Block
            swift build \
              --configuration release \
              --product SwiftComplexityMCP \
              -Xcxx -I${TOOLCHAIN_USR}/lib/swift \
              -Xcxx -I${TOOLCHAIN_USR}/lib/swift/Block
          fi

      - name: Create archive
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          PLATFORM="${{ matrix.platform }}"

          # Archive SwiftComplexityCLI
          CLI_ARCHIVE="SwiftComplexityCLI-${VERSION}-${PLATFORM}-${ARCH}"
          mkdir -p "artifacts/${CLI_ARCHIVE}"
          cp ".build/release/SwiftComplexityCLI" "artifacts/${CLI_ARCHIVE}/"
          cp README.md "artifacts/${CLI_ARCHIVE}/"
          cp -r docs "artifacts/${CLI_ARCHIVE}/"
          cat > "artifacts/${CLI_ARCHIVE}/install.sh" << 'EOF'
          #!/bin/bash
          set -e
          INSTALL_DIR="${HOME}/.local/bin"
          mkdir -p "$INSTALL_DIR"
          cp SwiftComplexityCLI "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/SwiftComplexityCLI"
          echo "SwiftComplexityCLI installed to $INSTALL_DIR"
          echo "Make sure $INSTALL_DIR is in your PATH"
          EOF
          chmod +x "artifacts/${CLI_ARCHIVE}/install.sh"

          # Archive SwiftComplexityMCP
          MCP_ARCHIVE="SwiftComplexityMCP-${VERSION}-${PLATFORM}-${ARCH}"
          mkdir -p "artifacts/${MCP_ARCHIVE}"
          cp ".build/release/SwiftComplexityMCP" "artifacts/${MCP_ARCHIVE}/"
          cp README.md "artifacts/${MCP_ARCHIVE}/"
          cat > "artifacts/${MCP_ARCHIVE}/install.sh" << 'EOF'
          #!/bin/bash
          set -e
          INSTALL_DIR="${HOME}/.local/bin"
          mkdir -p "$INSTALL_DIR"
          cp SwiftComplexityMCP "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/SwiftComplexityMCP"
          echo "SwiftComplexityMCP installed to $INSTALL_DIR"
          echo "Make sure $INSTALL_DIR is in your PATH"
          EOF
          chmod +x "artifacts/${MCP_ARCHIVE}/install.sh"

          # Create tarballs and checksums
          cd artifacts
          for dir in "${CLI_ARCHIVE}" "${MCP_ARCHIVE}"; do
            tar -czf "${dir}.tar.gz" "${dir}"
            shasum -a 256 "${dir}.tar.gz" > "${dir}.tar.gz.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-complexity-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*.tar.gz*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-artifacts]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: swift-complexity-*-*
          merge-multiple: true
          path: ./artifacts

      - name: Generate release body
        id: release_body
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          cat > release_body.md << EOF
          ## Installation

          ### CLI Tool (SwiftComplexityCLI)

          Download the appropriate binary for your platform:
          - **macOS Apple Silicon (M1/M2/M3)**: \`SwiftComplexityCLI-${VERSION}-macos-arm64.tar.gz\`
          - **macOS Intel**: \`SwiftComplexityCLI-${VERSION}-macos-x86_64.tar.gz\`
          - **Linux x86_64**: \`SwiftComplexityCLI-${VERSION}-linux-x86_64.tar.gz\`

          \`\`\`bash
          tar -xzf SwiftComplexityCLI-\${VERSION}-*.tar.gz
          cd SwiftComplexityCLI-\${VERSION}-*
          ./install.sh
          \`\`\`

          ### MCP Server (SwiftComplexityMCP)

          Download the MCP server for LLM agent integration:
          - **macOS Apple Silicon (M1/M2/M3)**: \`SwiftComplexityMCP-${VERSION}-macos-arm64.tar.gz\`
          - **macOS Intel**: \`SwiftComplexityMCP-${VERSION}-macos-x86_64.tar.gz\`
          - **Linux x86_64**: \`SwiftComplexityMCP-${VERSION}-linux-x86_64.tar.gz\`

          \`\`\`bash
          tar -xzf SwiftComplexityMCP-\${VERSION}-*.tar.gz
          cd SwiftComplexityMCP-\${VERSION}-*
          ./install.sh
          \`\`\`

          ### Build from Source

          \`\`\`bash
          git clone https://github.com/${{ github.repository }}.git
          cd swift-complexity
          git checkout v${VERSION}
          swift build -c release
          \`\`\`

          ## Verification

          \`\`\`bash
          shasum -a 256 -c SwiftComplexityCLI-\${VERSION}-*.tar.gz.sha256
          shasum -a 256 -c SwiftComplexityMCP-\${VERSION}-*.tar.gz.sha256
          \`\`\`
          EOF

          echo "Generated release body:"
          cat release_body.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [validate, create-release]
    if: always()

    steps:
      - name: Notify on success
        if: needs.create-release.result == 'success'
        run: |
          echo "✅ Release v${{ needs.validate.outputs.version }} created successfully!"

      - name: Notify on failure
        if: needs.create-release.result == 'failure'
        run: |
          echo "❌ Release v${{ needs.validate.outputs.version }} failed!"
          exit 1
