name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    strategy:
      matrix:
        os: [macos-15, ubuntu-22.04]
        swift-version: ["6.2"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1"

      - name: Setup Swift
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            # Install dependencies for Swiftly
            sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev pkg-config python3-lldb-13
            
            # Install Swiftly
            curl -O https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz
            tar zxf swiftly-$(uname -m).tar.gz
            ./swiftly init --verbose --assume-yes --skip-install
            . ~/.local/share/swiftly/env.sh
            
            # Install Swift
            swiftly install ${{ matrix.swift-version }}
            echo "$(dirname $(which swift))" >> $GITHUB_PATH
          else
            # macOS - use Xcode's Swift
            echo "Using Xcode's Swift on macOS"
            xcode-select --print-path
          fi
          swift --version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            .build
            Package.resolved
          key: ${{ runner.os }}-swift-${{ matrix.swift-version }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-${{ matrix.swift-version }}-

      - name: Build package (macOS)
        if: runner.os == 'macOS'
        run: swift build --configuration release

      - name: Build package (Linux)
        if: runner.os == 'Linux'
        run: |
          # Swiftly installs toolchains to ~/.local/share/swiftly/toolchains/<version>/
          # 'which swift' returns the wrapper, so we need to get the actual toolchain path
          SWIFTLY_HOME="${HOME}/.local/share/swiftly"
          TOOLCHAIN_USR=$(ls -d ${SWIFTLY_HOME}/toolchains/*/usr 2>/dev/null | head -1)
          # Check if TOOLCHAIN_USR is found
          test -n "${TOOLCHAIN_USR}" || (echo "Toolchain path not found!" && exit 1)
          echo "Using toolchain: ${TOOLCHAIN_USR}"
          # --- debug ---
          # For debug, check if headers exist
          ls ${TOOLCHAIN_USR}/lib/swift || (echo "Swift lib directory not found!" && exit 1)
          test -d ${TOOLCHAIN_USR}/lib/swift/Block || (echo "Block header not found!" && exit 1)
          # --- end debug ---
          swift build --configuration release \
            -Xcxx -I${TOOLCHAIN_USR}/lib/swift \
            -Xcxx -I${TOOLCHAIN_USR}/lib/swift/Block

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: swift test

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          SWIFTLY_HOME="${HOME}/.local/share/swiftly"
          TOOLCHAIN_USR=$(ls -d ${SWIFTLY_HOME}/toolchains/*/usr 2>/dev/null | head -1)
          swift test \
            -Xcxx -I${TOOLCHAIN_USR}/lib/swift \
            -Xcxx -I${TOOLCHAIN_USR}/lib/swift/Block

      - name: Test LCOM4 analysis (macOS)
        if: runner.os == 'macOS'
        run: |
          # Build with debug configuration to generate IndexStore
          swift build
          # Run LCOM4 analysis
          swift run SwiftComplexityCLI Sources --lcom4 --index-store-path .build/debug/index/store --format json --recursive

      - name: Test LCOM4 analysis (Linux)
        if: runner.os == 'Linux'
        run: |
          SWIFTLY_HOME="${HOME}/.local/share/swiftly"
          # Get toolchain path (without /usr suffix)
          TOOLCHAIN=$(ls -d ${SWIFTLY_HOME}/toolchains/* 2>/dev/null | head -1)
          TOOLCHAIN_USR="${TOOLCHAIN}/usr"
          echo "Using toolchain: ${TOOLCHAIN}"
          # Build with debug configuration to generate IndexStore
          swift build \
            -Xcxx -I${TOOLCHAIN_USR}/lib/swift \
            -Xcxx -I${TOOLCHAIN_USR}/lib/swift/Block
          # Run LCOM4 analysis (no build flags needed as binary is already built)
          swift run SwiftComplexityCLI Sources --lcom4 \
            --index-store-path .build/debug/index/store \
            --toolchain-path "${TOOLCHAIN}" \
            --format json --recursive

  lint:
    name: Code Quality
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1"

      - name: Setup Swift
        run: |
          # macOS - use Xcode's Swift
          echo "Using Xcode's Swift on macOS"
          xcode-select --print-path
          swift --version

      - name: Install swift-format (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install swift-format

      - name: Install swift-format (Linux)
        if: runner.os == 'Linux'
        run: |
          # On Linux, we'll skip swift-format for now as it requires complex setup
          echo "swift-format check skipped on Linux"

      - name: Check code formatting
        if: runner.os == 'macOS'
        run: |
          swift-format --configuration .swift-format --recursive Sources Tests

      - name: Lint documentation
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: ".markdownlint.yml"
        continue-on-error: true

  complexity-analysis:
    name: Self Complexity Analysis
    runs-on: macos-15
    needs: [test]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.1"

      - name: Setup Swift
        run: |
          # macOS - use Xcode's Swift
          echo "Using Xcode's Swift on macOS"
          xcode-select --print-path
          swift --version

      - name: Build swift-complexity
        run: swift build --configuration release

      - name: Run complexity analysis on self
        run: |
          swift run SwiftComplexityCLI Sources --format json --threshold 15 --recursive > complexity-report.json

      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: complexity-report.json

      - name: Comment complexity results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('complexity-report.json', 'utf8'));
              
              let comment = '## 🔍 Complexity Analysis Results\n\n';
              
              if (report.files && report.files.length > 0) {
                comment += `Found ${report.files.length} files with functions exceeding threshold (15):\n\n`;
                
                report.files.forEach(file => {
                  comment += `### ${file.filePath}\n`;
                  comment += '| Function | Cyclomatic | Cognitive |\n';
                  comment += '|----------|------------|----------|\n';
                  
                  file.functions.forEach(func => {
                    const cyclo = func.cyclomaticComplexity >= 15 ? `**${func.cyclomaticComplexity}**` : func.cyclomaticComplexity;
                    const cogn = func.cognitiveComplexity >= 15 ? `**${func.cognitiveComplexity}**` : func.cognitiveComplexity;
                    comment += `| ${func.name} | ${cyclo} | ${cogn} |\n`;
                  });
                  comment += '\n';
                });
              } else {
                comment += '✅ All functions are below the complexity threshold of 15.\n';
              }
              
              comment += '\n*This analysis was performed by swift-complexity itself.*';
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('No complexity report found or parsing failed:', error);
            }
